env:
  L: 4
  T: 16
  S: 15
  phase: 1

training:
  epochs: 250
  episodes_per_epoch: 32
  gamma: 0.99
  lam: 0.95
  clip_ratio: 0.2
  pi_lr: 3.0e-4
  v_lr: 1.0e-3
  train_pi_iters: 4
  train_v_iters: 4
  entropy_coef: 0.05
  grad_clip_norm: 0.5

discriminator:
  path: outputs/checkpoints/discriminator_best.pth

outputs:
  checkpoint_dir: outputs/checkpoints
  plot_dir: outputs/plots
